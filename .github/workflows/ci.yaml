name: CI

on:
  push:
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'Dockerfile.backend'
      - 'Dockerfile.frontend'
      - 'nginx.conf'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'Dockerfile.backend'
      - 'Dockerfile.frontend'
      - 'nginx.conf'
      - '.github/workflows/**'

jobs:
  # ── Backend lint ─────────────────────────────────────────────────────────
  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check backend/

  # ── Frontend build ────────────────────────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          # No cache here until frontend/package-lock.json is committed.
          # Switch to: cache: npm + cache-dependency-path: frontend/package-lock.json
          # and change npm install → npm ci once the lockfile is in the repo.

      - name: Install
        working-directory: frontend
        run: npm install

      - name: Build
        working-directory: frontend
        run: npm run build

  # ── Backend Docker integration test ───────────────────────────────────────
  docker-integration:
    runs-on: ubuntu-latest
    needs: [lint-backend, build-frontend]

    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: recipes
          MARIADB_USER: recipes
          MARIADB_PASSWORD: recipes
        ports:
          - 3306:3306
        options: >-
          --health-cmd "healthcheck.sh --su-mysql --connect --innodb_initialized"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f Dockerfile.backend -t recipe-book-backend-test .

      - name: Start backend container
        run: |
          docker run -d --name recipe-book-backend \
            --network host \
            -e DATABASE_URL="mariadb+pymysql://recipes:recipes@127.0.0.1:3306/recipes" \
            -e APP_PASSWORD="ci-password" \
            -e SESSION_SECRET="ci-secret-must-be-at-least-32-characters-long" \
            -e SECURE_COOKIES="False" \
            -e SHARE_BASE_URL="http://localhost:8000" \
            -e ANTHROPIC_API_KEY="" \
            -e OPENAI_API_KEY="" \
            recipe-book-backend-test

      - name: Wait for readiness
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/api/health; then
              echo "" && echo "Backend is ready"
              exit 0
            fi
            echo "Waiting... ($i/30)" && sleep 3
          done
          echo "Timed out" && exit 1

      - name: Test /api/health
        run: curl --fail http://localhost:8000/api/health

      - name: Test unauthenticated status
        run: |
          response=$(curl --fail -s http://localhost:8000/api/auth/status)
          echo "$response" | grep '"authenticated":false'

      - name: Test login with correct password
        run: |
          response=$(curl --fail -s -c /tmp/cookies.txt \
            -X POST http://localhost:8000/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"password":"ci-password"}')
          echo "$response" | grep '"ok":true'

      - name: Test authenticated status
        run: |
          response=$(curl --fail -s -b /tmp/cookies.txt http://localhost:8000/api/auth/status)
          echo "$response" | grep '"authenticated":true'

      - name: Test /api/recipes returns seed data
        run: |
          count=$(curl --fail -s -b /tmp/cookies.txt http://localhost:8000/api/recipes \
            | python3 -c "import sys,json; print(len(json.load(sys.stdin)))")
          echo "Recipes seeded: $count"
          [ "$count" -gt 0 ]

      - name: Test /api/categories returns 12
        run: |
          count=$(curl --fail -s -b /tmp/cookies.txt http://localhost:8000/api/categories \
            | python3 -c "import sys,json; print(len(json.load(sys.stdin)))")
          echo "Categories: $count"
          [ "$count" -eq 12 ]

      - name: Test wrong password is rejected
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://localhost:8000/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"password":"wrong"}')
          echo "Status: $status"
          [ "$status" = "401" ]

      - name: Test unauthenticated recipe access is rejected
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/recipes)
          echo "Status: $status"
          [ "$status" = "401" ]

      - name: Test invalid share token returns 404
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/api/share/invalid-xyz)
          echo "Status: $status"
          [ "$status" = "404" ]

      - name: Dump container logs on failure
        if: failure()
        run: |
          echo "===== Running containers ====="
          docker ps -a
          echo "===== recipe-book-backend logs ====="
          docker logs recipe-book-backend || true

      - name: Stop and remove container
        if: always()
        run: docker rm -f recipe-book-backend || true
