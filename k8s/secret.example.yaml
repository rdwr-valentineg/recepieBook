# Fill in the values, then apply:
#   kubectl create secret generic recipe-book-secret \
#     --from-env-file=.env \
#     -n default
#
# Or encode manually (base64 -w0):
apiVersion: v1
kind: Secret
metadata:
  name: recipe-book-secret
  namespace: default
type: Opaque
stringData:
  DATABASE_URL: "mariadb+pymysql://recipes:CHANGEME@mariadb.home.example.com:3306/recipes"
  APP_PASSWORD: "choose-a-strong-family-password"
  SESSION_SECRET: "run: openssl rand -hex 32"
  ANTHROPIC_API_KEY: "sk-ant-..."
  OPENAI_API_KEY: "sk-..."
  SHARE_BASE_URL: "https://example.com"
  SECURE_COOKIES: "True"
