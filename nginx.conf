server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: any path that isn't a real file gets index.html
    # React handles /share/<token> routing client-side.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-lived cache for hashed Vite bundles (assets/main.abc123.js etc.)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json
        image/svg+xml;
    gzip_min_length 1024;
}
